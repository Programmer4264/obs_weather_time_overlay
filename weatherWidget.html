<!doctype html>
<!--
weatherWidget with time overlay for OBS
Author: Norman Gholson IV 2022-2023
requires free private API Key from OpenWeatherMap.org
https://openweathermap.org/
-->
<html>

<head>
	<script>
		// ------------------------------------------------CHANGE THESE SETTINGS ----------------------------------------------- */
		// REQUIRED
		var yourApiKey = "API KEY";				// your OpenWeatherMap Api key here
		var yourCity = "YOUR CITY";					// your city name, ex: "London, UK" or "Las Vegas, NV, US" 
		var yourUnits = "imperial";					// 'imperial' for fahrenheit  'metric' for celsius  'standard' for kelvin.

		// OPTIONAL
		var weatherDisplay = "full";				// options: "full" , "weather", "simple" , "temp" , "time" (if blank or error, default is "full")
		var weatherIcons = 1;						// show Weather status icons in display 1=on  0=off
		var iconPack = 3;							// Icon Pack ID. (1-3) (add your own just follow the folder (pack1, pack2, pack3...) and file (01d.png, 01n.png) naming convention.  
		var iconHeight = "22px";					// weather icon height (for best results use textSize + 2. ex: textSize = 20pt + 2 = 22px)
		var textSize = "20pt";						// font size
		var textColor = "black";					// font color
		var weatherBackground = "lightgrey";		// weather Background color  (if dynamicBackground is enabled this only applies during daytime hours)
		var dynamicBackground = 1;					// weather background changes based on day or night 1=on 0=off
		var clockSeperator = "";					// optional: seperator for the temp and time in full mode only (ex: -, /, ., *, @, additional spaces, etc.)
		var time24hour = false;						// 24 hour time.  true or false
		var weatherBorder = "0";					// border size in pixels. default is 0
		var autoCheckUpdates = true;				// Automatically check for updates.

		// ---------------------------------------------  NO CHANGES BELOW HERE  ----------------------------------------------- */
	</script>
	<style>
		:root {
			--txtSize: ;
			--txtColor: ;
			--wBack: ;
			--wBorder: ;
		}

		.weather-box {
			border: var(--wBorder) solid #000;
			border-radius: 5px;
			text-align: center;
			font-family: tahoma;
			font-weight: bold;
			color: var(--txtColor);
			background: var(--wBack);
			font-size: var(--txtSize);
			padding-left: 20px;
			padding-right: 20px;
			padding-top: 1px;
			padding-bottom: 2px;
		}

		body {
			background: rgba(0, 0, 0, 0);
		}
	</style>
	<script>var weatherVersion; var weatherFriendly;</script>
	<script src="https://g4billiards.com/ver.js"></script>
	<script src="jquery.js"></script>
</head>

<body>
	<script>
		var wVer = 101;
		if (typeof weatherVersion === "number" && weatherVersion > wVer && localStorage.getItem(wVer + "." + weatherVersion + "update") !== "1" && autoCheckUpdates === true) {
			var updateVersion = weatherFriendly || weatherVersion;
			if (!confirm("g4Weather v" + updateVersion + " Update Available. Please visit:\nhttps://github.com/ngholson/obs_weather_time_overlay\nClick 'CANCEL' to hide future notifications about this update")) {
				localStorage.setItem(wVer + "." + weatherVersion + "update", 1);
			}
		}
	</script>
	<center>
		<span class="weather-box" id="id-weather"></span><br>
	</center>
	<script>
		var language = window.navigator.userLanguage || window.navigator.language;
		const htmlEntities = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" };
		const openWeatherIconCodePattern = /^[0-9]{2}[dn]$/;
		const supportedIconHeightPattern = /^[0-9]+(?:\.[0-9]+)?(?:px|pt|em|rem|vh|vw|%|ch|dvh|svw)$/;
		const regionTranslate = typeof Intl !== "undefined" && typeof Intl.DisplayNames === "function"
			? new Intl.DisplayNames([language], { type: 'region' })
			: null;
		document.querySelector(':root').style.setProperty('--txtSize', textSize); document.querySelector(':root').style.setProperty('--txtColor', textColor);
		document.querySelector(':root').style.setProperty('--wBack', weatherBackground);
		document.querySelector(':root').style.setProperty('--wBorder', weatherBorder + "px");
		var clockSeparator = clockSeperator;
		refreshData();

		// Function to convert a string to proper case
		function toProperCase(str) {
			return str.replace(/\w\S*/g, function (txt) {
				return txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase();
			});
		}

		function weatherCheck() {
			var displayMode = getWeatherDisplayMode();
			if (displayMode == "time") {
				renderWeatherMessage(getCurrentDisplayTime());
				return;
			}

			$.ajax({
				url: 'https://api.openweathermap.org/data/2.5/weather',
				data: { units: `${yourUnits}`, q: `${yourCity}`, appid: `${yourApiKey}`, lang: `${language}` },
				dataType: 'json',
				success: function (apiResponse) {
					var weatherDetails = getWeatherDetails(apiResponse);
					if (weatherDetails == null) {
						renderUnavailableWeather("Weather data unavailable");
						return;
					}

					updateDynamicBackground(weatherDetails.iconCode);
					$.ajax({
						url: 'https://api.openweathermap.org/geo/1.0/direct',
						data: { q: `${yourCity}`, appid: `${yourApiKey}` },
						dataType: 'json',
						success: function (geoResponse) {
							renderWeather(weatherDetails, apiResponse, geoResponse);
						},
						error: function () {
							renderWeather(weatherDetails, apiResponse, null);
						}
					});
				},
				error: function () {
					renderUnavailableWeather("Weather data unavailable");
				}
			});
		}
		function getWeatherDisplayMode() {
			var normalizedMode = String(weatherDisplay || "full").toLowerCase();
			if (["full", "weather", "simple", "temp", "time"].indexOf(normalizedMode) === -1) {
				return "full";
			}
			return normalizedMode;
		}
		function getCurrentDisplayTime() {
			return !time24hour ? currentTime(new Date()) : time24(new Date());
		}
		function escapeHtml(value) {
			return String(value == null ? "" : value).replace(/[&<>"']/g, function (character) {
				return htmlEntities[character];
			});
		}
		function renderWeatherMessage(message) {
			document.getElementById("id-weather").innerHTML = escapeHtml(message);
		}
		function getWeatherDetails(apiResponse) {
			if (!apiResponse || !apiResponse.main || typeof apiResponse.main.temp !== "number" || !apiResponse.weather || !apiResponse.weather[0]) {
				return null;
			}
			return {
				description: toProperCase(apiResponse.weather[0].description || "Unavailable"),
				temp: Math.round(apiResponse.main.temp),
				iconCode: apiResponse.weather[0].icon || ""
			};
		}
		function updateDynamicBackground(iconCode) {
			if (dynamicBackground != 1) {
				document.querySelector(':root').style.setProperty('--wBack', weatherBackground);
				document.querySelector(':root').style.setProperty('--txtColor', textColor);
				return;
			}

			if (String(iconCode).slice(2) == "n") {
				document.querySelector(':root').style.setProperty('--wBack', "linear-gradient(to bottom, black, dimgray)");
				document.querySelector(':root').style.setProperty('--txtColor', "white");
				return;
			}

			document.querySelector(':root').style.setProperty('--wBack', "linear-gradient(to bottom, skyblue, " + weatherBackground + ")");
			document.querySelector(':root').style.setProperty('--txtColor', "black");
		}
		function getGeoEntry(geoResponse) {
			if (!Array.isArray(geoResponse) || geoResponse.length === 0 || !geoResponse[0]) {
				return null;
			}
			return geoResponse[0];
		}
		function getRegionName(countryCode) {
			if (!countryCode) {
				return "";
			}
			try {
				return regionTranslate ? (regionTranslate.of(countryCode) || countryCode) : countryCode;
			} catch (error) {
				return countryCode;
			}
		}
		function getLocationLabel(apiResponse, geoResponse) {
			var geoEntry = getGeoEntry(geoResponse);
			var locationName = geoEntry && geoEntry.name ? geoEntry.name : (apiResponse && apiResponse.name ? apiResponse.name : yourCity);
			var locationState = geoEntry && geoEntry.state ? geoEntry.state : "";
			var countryCode = geoEntry && geoEntry.country ? geoEntry.country : (apiResponse && apiResponse.sys ? apiResponse.sys.country : "");

			if (countryCode && countryCode.toLowerCase() !== "us" && (locationState === (apiResponse && apiResponse.name ? apiResponse.name : "") || locationState === "")) {
				locationState = getRegionName(countryCode);
			}
			return escapeHtml(locationName + (locationState ? ", " + locationState : ""));
		}
		function isValidIconCode(iconCode) {
			// OpenWeather icon codes use two digits plus d (day) or n (night), for example 01d, 10n, or 13d.
			return openWeatherIconCodePattern.test(String(iconCode));
		}
		function getWeatherIconHtml(iconCode) {
			if (Number(weatherIcons) !== 1 || isValidIconCode(iconCode) === false) {
				return "";
			}
			var wimg = "./images/pack" + getIconPackId() + "/" + iconCode + ".png";
			return `<img style='height: ${getIconHeightValue()};' src='${wimg}' alt=''>`;
		}
		function getIconPackId() {
			var parsedIconPack = parseInt(iconPack, 10);
			return parsedIconPack > 0 ? parsedIconPack : 1;
		}
		function getIconHeightValue() {
			var normalizedIconHeight = String(iconHeight || "").trim();
			// Collapse accidental spaces in hand-edited values such as "22 px" before validating the CSS unit.
			var compactIconHeight = normalizedIconHeight.replace(/\s+/g, "");
			return supportedIconHeightPattern.test(compactIconHeight) ? compactIconHeight : "22px";
		}
		function getTimeSeparatorHtml() {
			if (!clockSeparator) {
				return " ";
			}
			return " " + escapeHtml(clockSeparator) + " ";
		}
		function renderUnavailableWeather(message) {
			document.querySelector(':root').style.setProperty('--wBack', weatherBackground);
			document.querySelector(':root').style.setProperty('--txtColor', textColor);

			var time = escapeHtml(getCurrentDisplayTime());
			var safeMessage = escapeHtml(message || "Weather unavailable");
			var displayMode = getWeatherDisplayMode();
			if (displayMode == "time") {
				document.getElementById("id-weather").innerHTML = time;
				return;
			}
			if (displayMode == "simple") {
				document.getElementById("id-weather").innerHTML = `${safeMessage} ${time}`;
				return;
			}
			if (displayMode == "full") {
				document.getElementById("id-weather").innerHTML = `${safeMessage}${getTimeSeparatorHtml()}${time}`;
				return;
			}
			document.getElementById("id-weather").innerHTML = safeMessage;
		}
		function renderWeather(weatherDetails, apiResponse, geoResponse) {
			var displayMode = getWeatherDisplayMode();
			var time = escapeHtml(getCurrentDisplayTime());
			var temp = `${weatherDetails.temp}&deg;`;
			var iconHtml = getWeatherIconHtml(weatherDetails.iconCode);
			var locationLabel = getLocationLabel(apiResponse, geoResponse);
			var weatherDescription = escapeHtml(weatherDetails.description);

			if (displayMode == "temp") {
				if (iconHtml != "") {
					document.getElementById("id-weather").innerHTML = `${iconHtml} ${temp}`;
					return;
				}
				document.getElementById("id-weather").innerHTML = temp;
				return;
			}
			if (displayMode == "simple") {
				if (iconHtml != "") {
					document.getElementById("id-weather").innerHTML = `${temp} ${iconHtml} ${time}`;
					return;
				}
				document.getElementById("id-weather").innerHTML = `${temp} ${time}`;
				return;
			}
			if (displayMode == "weather") {
				if (iconHtml != "") {
					document.getElementById("id-weather").innerHTML = `${locationLabel}: ${temp} ${iconHtml} ${weatherDescription}`;
					return;
				}
				document.getElementById("id-weather").innerHTML = `${locationLabel}: ${temp} / ${weatherDescription}`;
				return;
			}
			if (iconHtml != "") {
				document.getElementById("id-weather").innerHTML = `${locationLabel}: ${temp} ${iconHtml} ${weatherDescription}${getTimeSeparatorHtml()}${time}`;
				return;
			}
			document.getElementById("id-weather").innerHTML = `${locationLabel}: ${temp} / ${weatherDescription}${getTimeSeparatorHtml()}${time}`;
		}
		function currentTime(date) {
			var hours = date.getHours();
			var minutes = date.getMinutes();
			var isAmPm = hours >= 12 ? 'PM' : 'AM';
			hours = hours % 12;
			hours = hours ? hours : 12;
			minutes = minutes < 10 ? '0' + minutes : minutes;
			var curTime = hours + ':' + minutes + ' ' + isAmPm;
			return curTime;
		}
		function time24(date) {
			var hours = date.getHours();
			var minutes = date.getMinutes();
			hours = hours < 10 ? '0' + hours : hours;
			minutes = minutes < 10 ? '0' + minutes : minutes;
			var curTime24 = hours + ':' + minutes;
			return curTime24;
		}
		function refreshData() {
			weatherCheck();
			setTimeout(refreshData, 60000);
		}
	</script>
</body>

</html>
